name: Publish Cloud Run job
on:
  workflow_call:
    inputs:
      workload-identity-provider:
        description: Full identifier of the GitHub workload identity pool provider in Google Cloud
        type: string
        required: true
      service-account-email:
        description: Email of the Google Cloud service account for publishing the Cloud Run job
        type: string
        required: true
      region:
        description: The Google Cloud region to use
        type: string
        required: true
      name:
        description: The name of the job
        type: string
        required: true
      dockerfile:
        description: The path to the relevant Dockerfile
        type: string
        required: false
        default: Dockerfile
      build-path:
        description: The build path to use
        type: string
        required: false
        default: .
      execute-job:
        description: Whether to execute the Cloud Run job after updating
        type: boolean
        required: false
        default: false

concurrency: >-
  gcp-publish-cloud-run-job-${{ github.workflow_ref }}-${{ github.ref || github.run_id }}


jobs:
  publish-job:
    name: Push image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud Platform
        uses: google-github-actions/auth@v3
        id: gcp
        with:
          workload_identity_provider: ${{ inputs.workload-identity-provider }}
          service_account: ${{ inputs.service-account-email }}

      - name: Install gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Build and push image
        env:
          name: ${{ inputs.name }}:${{ github.sha }}
          registry: ${{ inputs.region }}-docker.pkg.dev
          registry_path: ${{ steps.gcp.outputs.project_id }}/${{ inputs.name }}
        id: image
        run: |-
          gcloud auth configure-docker --quiet marketplace.gcr.io
          gcloud auth configure-docker --quiet "${registry}"
          image_url="${registry}/${registry_path}/${name}"
          echo "image_url=${image_url}" >> $GITHUB_OUTPUT
          docker build --tag "${image_url}" --file "${{ inputs.dockerfile }}" \
            "${{ inputs.build-path }}"
          docker push "${image_url}"

      - name: Update Cloud Run job
        run: |-
          gcloud run jobs update "${{ inputs.name }}" \
            --region "${{ inputs.region }}" \
            --image "${{ steps.image.outputs.image_url }}"

      - name: Execute Cloud Run job
        if: inputs.execute-job
        run: |-
          gcloud run jobs execute "${{ inputs.name }}" \
            --region "${{ inputs.region }}" --wait
